name: validate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ibiqlik/action-yamllint@v3
        with:
          config_file: .yamllint
          file_or_dir: kubernetes/

  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: raven-actions/actionlint@v2

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: ./proxmox

  kubeconform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | tar -xz -C /usr/local/bin kubeconform
      - name: Validate manifests
        run: |
          kubeconform \
            -strict \
            -ignore-missing-schemas \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            -summary \
            kubernetes/

  nix-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: nix flake check (eval all hosts)
        working-directory: nixos
        run: nix flake check --no-build --show-trace

  kube-score:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install kube-score
        run: |
          curl -sSL https://github.com/zegl/kube-score/releases/download/v1.20.0/kube-score_1.20.0_linux_amd64.tar.gz \
            | tar -xz -C /usr/local/bin kube-score
      # Tests ignorés volontairement :
      # - container-image-pull-policy : pin par digest, IfNotPresent est correct
      # - container-security-context-user-group-id : bitnami/kubectl impose un user fixe
      # - container-security-context-readonlyrootfilesystem : kubectl écrit dans ~/.kube/cache
      # - pod-networkpolicy : couvertures déjà ok pour api/worker, faux positifs sur CronJobs
      - name: Score app manifests
        run: |
          kubectl kustomize kubernetes/apps/projet-etude-app-demo \
            | kube-score score \
                --output-format ci \
                --ignore-test container-image-pull-policy \
                --ignore-test container-security-context-user-group-id \
                --ignore-test container-security-context-readonlyrootfilesystem \
                --ignore-test pod-networkpolicy \
                -
