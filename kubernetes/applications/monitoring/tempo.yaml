apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tempo
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: tempo
    targetRevision: 1.18.4
    helm:
      releaseName: tempo
      values: |
        # Mode monolithic (single-binary). Conforme au lab 3-nœuds, comme Loki.
        tempo:
          retention: 168h
          metricsGenerator:
            enabled: false  # active service graph / span metrics si besoin
          receivers:
            otlp:
              protocols:
                grpc:
                  endpoint: 0.0.0.0:4317
                http:
                  endpoint: 0.0.0.0:4318
          storage:
            trace:
              backend: local
              local:
                path: /var/tempo/traces
        persistence:
          enabled: true
          storageClassName: local-path
          size: 10Gi
        service:
          type: ClusterIP
        resources:
          requests: { cpu: 100m, memory: 256Mi }
          limits:   { memory: 512Mi }
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff: { duration: 30s, factor: 2, maxDuration: 5m }
