apiVersion: apps/v1
kind: Deployment
metadata:
  name: projet-etude-app-demo-worker
  labels:
    app.kubernetes.io/name: projet-etude-app-demo
    app.kubernetes.io/component: worker
spec:
  # Pas de `replicas:` explicite : géré par l'HPA worker (minReplicas=1).
  selector:
    matchLabels:
      app.kubernetes.io/name: projet-etude-app-demo
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: projet-etude-app-demo
        app.kubernetes.io/component: worker
    spec:
      terminationGracePeriodSeconds: 30
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: projet-etude-app-demo
              app.kubernetes.io/component: worker
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: projet-etude-app-demo
                    app.kubernetes.io/component: worker
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: worker
          image: ghcr.io/waddenn/projet-etude-app-demo-worker:main
          ports:
            - containerPort: 8081
              name: metrics
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ticketdb-app
                  key: uri
            - name: METRICS_ADDR
              value: ":8081"
            # Pas d'URL réelle par défaut : le worker logge le webhook en stub.
            # Définir WEBHOOK_URL via secret/configmap pour Slack/Teams.
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://tempo.monitoring.svc.cluster.local:4317"
            - name: OTEL_EXPORTER_OTLP_INSECURE
              value: "true"
            - name: OTEL_SERVICE_NAME
              value: "projet-etude-app-demo-worker"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.namespace=projet-etude,deployment.environment=lab"
          imagePullPolicy: IfNotPresent
          resources:
            requests: { cpu: 50m, memory: 32Mi, ephemeral-storage: 64Mi }
            limits:   { cpu: 500m, memory: 128Mi, ephemeral-storage: 256Mi }
          readinessProbe:
            httpGet: { path: /readyz, port: metrics }
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /healthz, port: metrics }
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
