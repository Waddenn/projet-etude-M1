apiVersion: apps/v1
kind: Deployment
metadata:
  name: projet-etude-app-demo
  labels:
    app.kubernetes.io/name: projet-etude-app-demo
    app.kubernetes.io/component: api
spec:
  # Pas de `replicas:` explicite : géré par l'HPA (minReplicas=2).
  # Forcer une valeur ici créerait un drift continu HPA ↔ apply.
  selector:
    matchLabels:
      app.kubernetes.io/name: projet-etude-app-demo
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: projet-etude-app-demo
        app.kubernetes.io/component: api
    spec:
      terminationGracePeriodSeconds: 20
      # Étale les pods api sur des nœuds distincts si possible : un pod-kill
      # ou un drain ne supprime pas l'intégralité des replicas.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: projet-etude-app-demo
              app.kubernetes.io/component: api
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: projet-etude-app-demo
                    app.kubernetes.io/component: api
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: app
          image: ghcr.io/waddenn/projet-etude-app-demo-api:main
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ticketdb-app
                  key: uri
            # Active les endpoints destructifs /api/panic, /api/crash, /api/memleak.
            # À retirer hors démo.
            - name: DEMO_CHAOS_ENABLED
              value: "1"
            # OpenTelemetry → Tempo (OTLP gRPC).
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://tempo.monitoring.svc.cluster.local:4317"
            - name: OTEL_EXPORTER_OTLP_INSECURE
              value: "true"
            - name: OTEL_SERVICE_NAME
              value: "projet-etude-app-demo-api"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.namespace=projet-etude,deployment.environment=lab"
            - name: APP_VERSION
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['app.kubernetes.io/version']
            # OIDC via Dex (projeté depuis Vault par ExternalSecrets).
            # Désactivé tant que Vault n'est pas bootstrappé. Bascule :
            #    1. just vault-bootstrap (kv put des 3 entrées)
            #    2. décommenter le bloc ci-dessous et `just k apply -k kubernetes/apps/projet-etude-app-demo`
            # Sans ces variables, l'app tourne en "dev mode" :
            # toutes les requêtes sont authentifiées en tant que dev/operator.
            # - name: OIDC_ISSUER_URL
            #   value: "http://dex.security.svc.cluster.local:5556/dex"
            # - name: OIDC_CLIENT_ID
            #   value: "projet-etude-app-demo"
            # - name: OIDC_CLIENT_SECRET
            #   valueFrom:
            #     secretKeyRef:
            #       name: oidc-client
            #       key: client-secret
            # - name: OIDC_REDIRECT_URL
            #   value: "https://projet-etude.tail-scale.ts.net:9443/app-demo/auth/callback"
            # - name: OIDC_VIEWER_GROUP
            #   value: "viewers"
            # - name: OIDC_OPERATOR_GROUP
            #   value: "operators"
            # - name: OIDC_OPERATOR_EMAILS
            #   value: "operator@projet-etude.local"
            # - name: SESSION_KEY
            #   valueFrom:
            #     secretKeyRef:
            #       name: app-session
            #       key: key
          imagePullPolicy: IfNotPresent
          resources:
            requests: { cpu: 50m, memory: 32Mi, ephemeral-storage: 64Mi }
            limits:   { cpu: 500m, memory: 128Mi, ephemeral-storage: 256Mi }
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
