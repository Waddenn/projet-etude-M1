apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: app-demo-strip-prefix
spec:
  stripPrefix:
    prefixes:
      - /app-demo
    forceSlash: false
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: projet-etude-app-demo
  annotations:
    # Traefik k3s : entrypoint HTTP (web). Tailscale-serve gère le TLS en amont.
    traefik.ingress.kubernetes.io/router.entrypoints: web
    # Strip /app-demo avant de passer à l'app (qui sert tout depuis /).
    traefik.ingress.kubernetes.io/router.middlewares: projet-etude-app-demo-app-demo-strip-prefix@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /app-demo
            pathType: Prefix
            backend:
              service:
                name: projet-etude-app-demo
                port:
                  number: 80
