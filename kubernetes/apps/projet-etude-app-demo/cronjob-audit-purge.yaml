apiVersion: batch/v1
kind: CronJob
metadata:
  name: projet-etude-app-demo-audit-purge
  labels:
    app.kubernetes.io/name: projet-etude-app-demo
    app.kubernetes.io/component: audit-purge
spec:
  schedule: "15 3 * * 0"   # tous les dimanches 03:15
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            seccompProfile: { type: RuntimeDefault }
          containers:
            - name: purge
              image: ghcr.io/waddenn/projet-etude-app-demo-audit-purge:main
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: ticketdb-app
                      key: uri
                - name: AUDIT_RETENTION_DAYS
                  value: "90"
              resources:
                requests: { cpu: 20m, memory: 32Mi }
                limits:   { memory: 64Mi }
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
