apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Labels communs propagés à toutes les ressources, sans toucher aux selectors
# (immutables sur Deployment / StatefulSet — un commonLabels classique casserait).
labels:
- includeSelectors: false
  includeTemplates: false
  pairs:
    app.kubernetes.io/part-of: projet-etude
    app.kubernetes.io/managed-by: argocd
resources:
- database.yaml
- deployment-api.yaml
- deployment-worker.yaml
- service.yaml
- service-worker.yaml
- hpa.yaml
- hpa-worker.yaml
- ingress.yaml
- servicemonitor.yaml
- servicemonitor-worker.yaml
- prometheusrule.yaml
- networkpolicy.yaml
- pdb.yaml
- chaos.yaml
- cronjob-audit-purge.yaml
- externalsecrets.yaml
- dashboard.yaml
- dashboard-slo.yaml
- dashboard-worker.yaml
images:
- name: ghcr.io/waddenn/projet-etude-app-demo-api
  digest: sha256:9b594e894d7297b2be14d2d40d7d4cf0af0a916760fadf7c6461769aa5a05ce5
- name: ghcr.io/waddenn/projet-etude-app-demo-worker
  digest: sha256:73cebeeb02756d09227dcea97ab490abf817fc252627502c473eff91c2bfa275
- name: ghcr.io/waddenn/projet-etude-app-demo-audit-purge
  newTag: main
