# ExternalSecret : projection des secrets Vault dans le namespace de l'app.
# Bootstrap manuel à exécuter UNE fois après le déploiement de Vault :
#
#   VAULT_TOKEN=root-dev-token vault kv put secret/projet-etude/db \
#       uri='postgres://app:CHANGEME@ticketdb-rw.projet-etude-app-demo:5432/app?sslmode=disable'
#   VAULT_TOKEN=root-dev-token vault kv put secret/projet-etude/oidc \
#       client-secret='generated-by-dex'
#   VAULT_TOKEN=root-dev-token vault kv put secret/projet-etude/webhook \
#       url='https://hooks.slack.com/services/XXX/YYY/ZZZ'
#   VAULT_TOKEN=root-dev-token vault kv put secret/projet-etude/session \
#       key='32-byte-random-key-generated-locally'
#
# Ensuite ESO synchronise toutes les 1 min vers les Secret natifs ci-dessous.

# Note : `ticketdb-app` reste géré par CNPG (Cluster.spec.bootstrap génère
# automatiquement le Secret avec un mot de passe random). On ne le copie pas
# dans Vault pour éviter un conflit ESO ↔ CNPG ; CNPG a la responsabilité de
# le faire tourner via les RoleBindings de l'opérateur.

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "5"
  name: oidc-client
  labels: { app.kubernetes.io/name: projet-etude-app-demo }
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: oidc-client
    creationPolicy: Owner
  data:
    - secretKey: client-secret
      remoteRef:
        key: projet-etude/oidc
        property: client-secret
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "5"
  name: app-session
  labels: { app.kubernetes.io/name: projet-etude-app-demo }
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: app-session
    creationPolicy: Owner
  data:
    - secretKey: key
      remoteRef:
        key: projet-etude/session
        property: key
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "5"
  name: app-webhook
  labels: { app.kubernetes.io/name: projet-etude-app-demo }
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: app-webhook
    creationPolicy: Owner
  data:
    - secretKey: url
      remoteRef:
        key: projet-etude/webhook
        property: url
