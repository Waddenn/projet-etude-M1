# HPA du worker : par défaut on scale sur CPU pour rester fonctionnel sans
# prometheus-adapter / KEDA installés. Le bloc External (commenté) montre
# comment piloter par la profondeur de queue dès que l'un des deux est en place.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: projet-etude-app-demo-worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: projet-etude-app-demo-worker
  minReplicas: 1
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    # Activer une fois prometheus-adapter (ou KEDA via Prometheus) configuré :
    # - type: External
    #   external:
    #     metric:
    #       name: jobs_queue_depth
    #       selector:
    #         matchLabels:
    #           service: projet-etude-app-demo-worker
    #     target:
    #       type: AverageValue
    #       averageValue: "10"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 15
      policies:
        - type: Pods
          value: 2
          periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
---
# Alternative recommandée : KEDA ScaledObject (à activer si KEDA est installé).
